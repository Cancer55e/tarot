<script>

//=====================

const stellaCards = {

4:"REIGNS пҪһеҗӣиҮЁгҒҷгӮӢиҖ…пҪһ",
5:"SHAMAN пҪһдјқе°Һеё«пҪһ",
6:"DEAREST пҪһж„ӣгӮ’дёҺгҒҲгӮӢиҖ…пҪһ",
7:"VALKYRIE пҪһй»„йҮ‘йҰ¬и»ҠпҪһ",
8:"EUSTITIA пҪһиЈҒгҒҚгҒ®еҘізҘһпҪһ",
9:"ASTRONOMER пҪһеӨ©ж–ҮеӯҰиҖ…пҪһ",
10:"PHARAOH пҪһгғ•гӮЎгғ©гӮӘпҪһ",
11:"HARDY EXPLORER пҪһеұҲеј·гҒӘжҺўжӨңе®¶пҪһ",
12:"SAMURAI пҪһдҫҚйӯӮпҪһ",
13:"STARS MAKER пҪһжҳҹгӮ’з”ҹгӮҖиҖ…пҪһ",
14:"ALL THE RAGE пҪһдёҖдё–йўЁйқЎпҪһ",
15:"REVOLUTIONIST пҪһйқ©е‘Ҫе®¶пҪһ",
16:"TRANSFORMERS пҪһйҫҚзҘһпҪһ",
17:"THE HERO пҪһе„ӘгҒ—гҒҚиӢұйӣ„пҪһ",
18:"CLEVER THINKER пҪһжңҲгҒ®зҘһпҪһ",
19:"THE KING OF KINGS пҪһдё–з•ҢзҡҮеёқпҪһ",
20:"CELEBRATER пҪһеӨ©дҪҝпҪһ",
21:"THE CREATER пҪһеүөйҖ дё»пҪһ"
};

//=====================
// гғҶгӮӨгғ«
//=====================

const tailCards = {
0:"NEW BASIS",
1:"SOW THE SEEDS",
2:"ROOTS GROW",
3:"A VAST FOREST",
4:"TACTICS",
5:"LEARNING",
6:"BUDDY",
7:"SWITCH",
8:"JUDGEMENT",
9:"DISTANT STAR",
10:"MOVEMENT AND CHANGE",
11:"DIVISION POINT",
12:"CONTROL",
13:"SKIP ABOUT",
14:"TRANSFER",
15:"DESIRE",
16:"SCRAP AND BUILD",
17:"NEW STELLAR",
18:"ILLUSION",
19:"CORRECT",
20:"COMPLETION",
21:"A GALAXY"
};

//=====================
// гӮ№гғҶгғ©иЁҲз®—
//=====================

function calcStella(date){

let y=date.getFullYear();
let m=date.getMonth()+1;
let d=date.getDate();

let sum=(y+""+m+d)
.split("")
.reduce((a,b)=>a+Number(b),0);

while(sum>=22){
sum=sum.toString()
.split("")
.reduce((a,b)=>a+Number(b),0);
}

return sum;

}

//=====================
// е№ҙйҪў
//=====================

function calcAge(birth){

let today=new Date();

let age=today.getFullYear()-birth.getFullYear();

let birthday=new Date(
today.getFullYear(),
birth.getMonth(),
birth.getDate()
);

if(today<birthday) age--;

return age;

}

//=====================
// гғҶгӮӨгғ«
//=====================

function calcTail(age,stella){

let raw=age+stella;

return ((raw%22)+22)%22;

}

//=====================
// е‘Ёзӣ®
//=====================

function calcWeek(age,stella){

if(age<=18) return 0;

let raw=age+stella;

let startRaw=19+stella;

let firstMultiple=Math.ceil(startRaw/22)*22;

if(raw<firstMultiple) return 0;

return 1+Math.floor((raw-firstMultiple)/22);

}

//=====================
// иҮӘеӢ•иЁҲз®—
//=====================

function autoCalc(){

let birth=document.getElementById("birth").value;

if(birth.length===8){
calculate();
}

}

//=====================
// гғЎгӮӨгғіиЁҲз®—
//=====================

function calculate(){

let birth=document.getElementById("birth").value;

if(!birth || birth.length!==8){
alert("8жЎҒгҒ§е…ҘеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„");
return;
}

let y=Number(birth.slice(0,4));
let m=Number(birth.slice(4,6))-1;
let d=Number(birth.slice(6,8));

let date=new Date(y,m,d);

if(date.getFullYear()!=y){
alert("ж—Ҙд»ҳгҒҢйҒ•гҒ„гҒҫгҒҷ");
return;
}

let stella=calcStella(date);
let age=calcAge(date);
let tail=calcTail(age,stella);
let week=calcWeek(age,stella);

let prev=(tail+21)%22;
let next=(tail+1)%22;

document.getElementById("result").innerHTML=`

<div class="card">

<h3>вӯҗ гӮ№гғҶгғ©гғҠгғігғҗгғј ${stella}</h3>

<p>${stellaCards[stella]}</p>

<img class="stella-img" src="./img/stella/${String(stella).padStart(2,"0")}.png">

</div>

<div class="card">

<p class="small">${age}жӯі</p>
<p class="small">${week}е‘Ёзӣ®</p>

<h3>рҹҢҷ гғҶгӮӨгғ«гӮӨгғӨгғј</h3>

<div class="tail-container">

<div class="tail-box">
<p>еүҚ</p>
<h4>${prev}</h4>
<p class="small">${tailCards[prev]}</p>
</div>

<div class="tail-box tail-current">
<p>зҸҫеңЁ</p>
<h3>${tail}</h3>
<p class="small">${tailCards[tail]}</p>
</div>

<div class="tail-box">
<p>ж¬Ў</p>
<h4>${next}</h4>
<p class="small">${tailCards[next]}</p>
</div>

</div>

</div>

<hr>

<h3>рҹ”Һ дҪ•жӯігҒ®гғҶгӮӨгғ«гӮӨгғӨгғјгӮ’иҰӢгӮӢпјҹ</h3>

<input
type="number"
id="ageLook"
placeholder="дҫӢпјҡ27"
min="0"
max="120">

<button onclick="lookTail(${stella})">
зўәе®ҡ
</button>

<div id="lookResult"></div>

<hr>

<h3>вӯҗ дәҢдәәгҒ®гӮ№гғҶгғ©гғҠгғігғҗгғјгӮ’иҰӢгӮӢ</h3>

<input
type="text"
id="partnerBirth"
placeholder="дҫӢпјҡ19920315"
maxlength="8">

<button onclick="pairStella(${stella})">
зўәе®ҡ
</button>

<div id="pairResult"></div>

function lookTail(stella){

let age=document.getElementById("ageLook").value;

if(age===""){
alert("е№ҙйҪўгӮ’е…ҘеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„");
return;
}

age=Number(age);

let tail=(age+stella)%22;
if(tail<0) tail+=22;

let prev=(tail+21)%22;
let next=(tail+1)%22;

let week=calcWeek(age,stella);

document.getElementById("lookResult").innerHTML=`

<div class="card">

<p class="small">${age}жӯі</p>
<p class="small">${week}е‘Ёзӣ®</p>

<div class="tail-container">

<div class="tail-box">
<p>еүҚ</p>
<h4>${prev}</h4>
<p class="small">${tailCards[prev]}</p>
</div>

<div class="tail-box tail-current">
<p>жҢҮе®ҡ</p>
<h3>${tail}</h3>
<p class="small">${tailCards[tail]}</p>
</div>

<div class="tail-box">
<p>ж¬Ў</p>
<h4>${next}</h4>
<p class="small">${tailCards[next]}</p>
</div>

</div>

</div>

`;

}
function pairStella(myStella){

let birth=document.getElementById("partnerBirth").value;

if(birth.length!==8){
alert("з”ҹе№ҙжңҲж—ҘгӮ’8жЎҒгҒ§е…ҘеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„");
return;
}

let nums=(birth).split("").map(Number);
let sum=nums.reduce((a,b)=>a+b,0);

while(sum>=22){
sum=sum.toString().split("").map(Number).reduce((a,b)=>a+b,0);
}

let partnerStella=sum;

document.getElementById("pairResult").innerHTML=`
<div class="tail-container">

е…ұжңү
</button>
`;

}

}
