<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>cancer.55e Stella & Tail</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:sans-serif;
background:#0a0a1a;
color:white;
text-align:center;
padding:20px;
}

h1,h2,h3,h4{
margin:10px 0;
}

.card{
margin-top:15px;
padding:15px;
border-radius:12px;
background:#1a1a2e;
}

input,button{
padding:12px;
font-size:16px;
margin:10px;
border-radius:6px;
border:none;
}

input{
width:240px;
text-align:center;
}

button{
background:#5c6cff;
color:white;
cursor:pointer;
}

.tail-container{
display:flex;
gap:10px;
margin-top:15px;
}

.tail-box{
flex:1;
padding:10px;
border-radius:10px;
background:#1a1a2e;
}

.tail-current{
border:2px solid #5c6cff;
}

.small{
font-size:12px;
opacity:0.85;
}

.stella-img{
width:200px;
margin-top:10px;
border-radius:10px;
}

.pair-grid{
display:flex;
gap:10px;
}

.pair-card{
flex:1;
background:#1a1a2e;
padding:10px;
border-radius:10px;
}

.saved-scroll{
display:flex;
gap:10px;
overflow-x:auto;
margin-top:10px;
}

.saved-item{
min-width:110px;
background:#1a1a2e;
border-radius:10px;
padding:10px;
}

.saved-item img{
width:70px;
}

</style>
</head>

<body>

<h1>🌌 cancer.55e</h1>
<h2>Stella & Tail Calculator</h2>

<input
type="text"
id="birth"
placeholder="例：19980715"
maxlength="8"
inputmode="numeric"
oninput="autoCalc()">

<div id="result"></div>

<script>

//=====================
// ステラカード
//=====================

const stellaCards = {

3:"GENERATOR ～美の女神～",
4:"REIGNS ～君臨する者～",
5:"SHAMAN ～伝導師～",
6:"DEAREST ～愛を与える者～",
7:"VALKYRIE ～黄金馬車～",
8:"EUSTITIA ～裁きの女神～",
9:"ASTRONOMER ～天文学者～",
10:"PHARAOH ～ファラオ～",
11:"HARDY EXPLORER ～屈強な探検家～",
12:"SAMURAI ～侍魂～",
13:"STARS MAKER ～星を生む者～",
14:"ALL THE RAGE ～一世風靡～",
15:"REVOLUTIONIST ～革命家～",
16:"TRANSFORMERS ～龍神～",
17:"THE HERO ～優しき英雄～",
18:"CLEVER THINKER ～月の神～",
19:"THE KING OF KINGS ～世界皇帝～",
20:"CELEBRATER ～天使～",
21:"THE CREATER ～創造主～"

};

//=====================
// テイルカード
//=====================

const tailCards = {

0:"NEW BASIS",
1:"SOW THE SEEDS",
2:"ROOTS GROW",
3:"A VAST FOREST",
4:"TACTICS",
5:"LEARNING",
6:"BUDDY",
7:"SWITCH",
8:"JUDGEMENT",
9:"DISTANT STAR",
10:"MOVEMENT AND CHANGE",
11:"DIVISION POINT",
12:"CONTROL",
13:"SKIP ABOUT",
14:"TRANSFER",
15:"DESIRE",
16:"SCRAP AND BUILD",
17:"NEW STELLAR",
18:"ILLUSION",
19:"CORRECT",
20:"COMPLETION",
21:"A GALAXY"

};

//=====================
// 画像パス
//=====================

function stellaImgPath(stella){

return `img/stella/${String(stella).padStart(2,"0")}.png`;

}

//=====================
// ステラ計算
//=====================

function calcStella(date){

let y=date.getFullYear();
let m=date.getMonth()+1;
let d=date.getDate();

let sum=(""+y+m+d)
.split("")
.reduce((a,b)=>a+Number(b),0);

while(sum>=22){

sum=sum.toString()
.split("")
.reduce((a,b)=>a+Number(b),0);

}

return sum;

}

//=====================
// 年齢
//=====================

function calcAge(birth){

let today=new Date();

let age=today.getFullYear()-birth.getFullYear();

let birthday=new Date(
today.getFullYear(),
birth.getMonth(),
birth.getDate()
);

if(today<birthday) age--;

return age;

}

//=====================
// テイル
//=====================

function tail(age,stella){

return((age+stella)%22+22)%22;

}

//=====================
// 周目
//=====================

function calcWeek(age,stella){

if(age<=18) return 0;

let raw=age+stella;

let start=19+stella;

let first=Math.ceil(start/22)*22;

if(raw<first) return 0;

return 1+Math.floor((raw-first)/22);

}

//=====================
// 自動計算
//=====================

function autoCalc(){

let birth=document.getElementById("birth").value;

if(birth.length===8) calculate();

}

//=====================
// メイン計算
//=====================

function calculate(){

let birth=document.getElementById("birth").value;

let y=Number(birth.slice(0,4));
let m=Number(birth.slice(4,6))-1;
let d=Number(birth.slice(6,8));

let date=new Date(y,m,d);

let stella=calcStella(date);

let age=calcAge(date);

let tailNow=tail(age,stella);

let week=calcWeek(age,stella);

let prev=(tailNow+21)%22;
let next=(tailNow+1)%22;

document.getElementById("result").innerHTML=`

<div class="card">

<h3>⭐ ステラナンバー ${stella}</h3>

<p>${stellaCards[stella]}</p>

<img class="stella-img" src="${stellaImgPath(stella)}">

</div>

<div class="card">

<p class="small">${age}歳：現在の年齢</p>

<p class="small">${week}周目</p>

<h3>🌙 テイルイヤー</h3>

<div class="tail-container">

<div class="tail-box">

<p>前</p>

<h4>${prev}</h4>

<p class="small">${tailCards[prev]}</p>

</div>

<div class="tail-box tail-current">

<p>現在</p>

<h3>${tailNow}</h3>

<p class="small">${tailCards[tailNow]}</p>

</div>

<div class="tail-box">

<p>次</p>

<h4>${next}</h4>

<p class="small">${tailCards[next]}</p>

</div>

</div>

</div>

`;

}

</script>

</body>
</html>
